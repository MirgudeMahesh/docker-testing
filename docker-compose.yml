version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=jwt
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: mahesh5402/backend:latest
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: mahesh5402/frontend-react:latest
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: